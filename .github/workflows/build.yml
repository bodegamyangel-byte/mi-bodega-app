name: Compilar APK de Mi Bodega

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Instalar dependencias del sistema
      run: |
        sudo apt-get update
        sudo apt-get install -y libncurses5 libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev

    - name: Instalar Buildozer y Cython
      run: |
        pip3 install --user --upgrade buildozer cython==0.29.33

    - name: Aceptar licencias de Android SDK (en todos lados)
      run: |
        # Creamos las carpetas de licencias donde Buildozer las busca
        mkdir -p ~/.android/licenses
        mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
        
        # Copiamos los archivos de aceptación en ambos sitios
        echo "8933bad161af4178b1185d1a37fbf41ea5261c55" > ~/.android/licenses/android-sdk-license
        echo "d56f51874737515e191356c5a61400c41872146e" >> ~/.android/licenses/android-sdk-license
        echo "84831b9409646a918e30573bab4c9c91346d8a43" >> ~/.android/licenses/android-sdk-license
        
        cp ~/.android/licenses/* ~/.buildozer/android/platform/android-sdk/licenses/

    - name: Compilar con Buildozer
      run: |
        export PATH=$PATH:~/.local/bin
        # Forzamos la compilación
        buildozer android debug

    - name: Guardar el archivo APK resultante
      uses: actions/upload-artifact@v4
      with:
        name: Mi-Bodega-APK
        path: bin/*.apk