name: Compilar APK de Mi Bodega

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Instalar dependencias del sistema
      run: |
        sudo apt-get update
        sudo apt-get install -y libncurses5 libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev

    - name: Instalar Buildozer y Cython
      run: |
        pip3 install --user --upgrade buildozer cython==0.29.33

    - name: Compilar con Buildozer (Pre-descarga)
      run: |
        export PATH=$PATH:~/.local/bin
        # Primera pasada: descargará las herramientas
        buildozer android debug || true

    - name: Aceptar licencias proactivamente
      run: |
        # Localizamos el sdkmanager que Buildozer descargó
        SDKMANAGER=$HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager
        if [ -f "$SDKMANAGER" ]; then
          # Ejecutamos el comando para aceptar todas las licencias automáticamente
          yes | $SDKMANAGER --licenses
        fi

    - name: Forzar ubicación de herramientas (Fix adicional)
      run: |
        mkdir -p $HOME/.buildozer/android/platform/android-sdk/tools/bin
        if [ -d "$HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin" ]; then
           cp -r $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/* $HOME/.buildozer/android/platform/android-sdk/tools/bin/
        fi

    - name: Compilar (Intento Final)
      run: |
        export PATH=$PATH:~/.local/bin
        buildozer android debug

    - name: Guardar el archivo APK resultante
      uses: actions/upload-artifact@v4
      with:
        name: Mi-Bodega-APK
        path: bin/*.apk