name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev
          
      - name: Install Buildozer
        run: pip3 install --user --upgrade buildozer
        
      - name: Build APK
        run: |
          # Esto le dice a Buildozer que acepte las licencias automáticamente
          export ANDROID_SDK_HOME=$HOME/.android
          buildozer android debug
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk