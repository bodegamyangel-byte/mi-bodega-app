name: Compilar APK de Mi Bodega

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Instalar dependencias
      run: |
        sudo apt-get update
        sudo apt-get install -y libncurses5 libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
        pip3 install --user --upgrade buildozer cython==0.29.33

    - name: Inyectar Licencias Android
      run: |
        # Creamos la carpeta de licencias en la ruta exacta donde Buildozer instala el SDK
        mkdir -p $HOME/.buildozer/android/platform/android-sdk/licenses
        
        # Inyectamos los archivos de licencia que el SDK manager busca
        echo "8933bad161af4178b1185d1a37fbf41ea5261c55" > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo "d56f51874737515e191356c5a61400c41872146e" >> $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo "84831b9409646a918e30573bab4c9c91346d8a43" >> $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license

    - name: Compilar APK
      run: |
        export PATH=$PATH:~/.local/bin
        # Buildozer ya no debería pedir licencias porque ya están ahí
        buildozer android debug

    - name: Guardar el archivo APK resultante
      uses: actions/upload-artifact@v4
      with:
        name: Mi-Bodega-APK
        path: bin/*.apk