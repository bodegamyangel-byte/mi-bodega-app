name: Compilar APK de Mi Bodega

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Instalar dependencias
      run: |
        sudo apt-get update
        sudo apt-get install -y libncurses5 libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
        pip3 install --user --upgrade buildozer cython==0.29.33

    - name: Pre-instalar Android SDK
      run: |
        # Descargar herramientas de línea de comandos (cmdline-tools)
        mkdir -p $HOME/.buildozer/android/platform/android-sdk/cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O tools.zip
        unzip -q tools.zip -d $HOME/.buildozer/android/platform/android-sdk/cmdline-tools
        mv $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/cmdline-tools $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest
        rm tools.zip
        
        # Aceptar licencias
        yes | $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses
        
        # Instalar plataforma necesaria
        $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.0"

    - name: Compilar APK
      run: |
        export PATH=$PATH:~/.local/bin
        # Buildozer ahora encontrará el SDK pre-instalado y no dará error
        buildozer android debug

    - name: Guardar el archivo APK resultante
      uses: actions/upload-artifact@v4
      with:
        name: Mi-Bodega-APK
        path: bin/*.apk