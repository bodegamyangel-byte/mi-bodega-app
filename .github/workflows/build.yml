name: Compilar APK de Mi Bodega

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Instalar dependencias del sistema
      run: |
        sudo apt-get update
        sudo apt-get install -y libncurses5 libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev

    - name: Instalar Buildozer y Cython
      run: |
        pip3 install --user --upgrade buildozer cython==0.29.33

    - name: Pre-configurar carpetas para Buildozer
      run: |
        # Creamos las carpetas donde Buildozer espera encontrar cosas
        mkdir -p $HOME/.buildozer/android/platform/android-sdk/tools/bin

    - name: Compilar con Buildozer
      run: |
        export PATH=$PATH:~/.local/bin
        # Intentamos compilar. Si falla al instalar SDK, al menos Buildozer habrá descargado los archivos
        # Usamos --no-sdk-update para que intente usar lo que ya hay si es posible
        buildozer android debug || true
        
        # EL TRUCO: Si el sdkmanager está en otro lado, creamos un enlace a donde lo busca
        # Esto busca dónde se instaló realmente el cmdline-tools y lo vincula
        if [ -d "$HOME/.buildozer/android/platform/android-sdk/cmdline-tools" ]; then
           ln -s $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager $HOME/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager
        fi

    - name: Compilar (Segundo intento)
      run: |
        export PATH=$PATH:~/.local/bin
        buildozer android debug

    - name: Guardar el archivo APK resultante
      uses: actions/upload-artifact@v4
      with:
        name: Mi-Bodega-APK
        path: bin/*.apk