name: Compilar APK de Mi Bodega

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Instalar dependencias
      run: |
        sudo apt-get update
        sudo apt-get install -y libncurses5 libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
        pip3 install --user --upgrade buildozer cython==0.29.33

    - name: Aceptar licencias y Preparar SDK
      run: |
        # Intentamos compilar una vez para que Buildozer descargue las herramientas
        # Esto fallará, pero es necesario para que las herramientas existan
        buildozer android debug || true
        
        # Encontramos dónde está el sdkmanager
        SDKMANAGER=$HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager
        
        # Forzamos la aceptación de todas las licencias
        if [ -f "$SDKMANAGER" ]; then
          yes | $SDKMANAGER --licenses || true
        fi

    - name: Compilar APK
      run: |
        export PATH=$PATH:~/.local/bin
        # Compilación final
        buildozer android debug

    - name: Guardar el archivo APK resultante
      uses: actions/upload-artifact@v4
      with:
        name: Mi-Bodega-APK
        path: bin/*.apk