name: Compilar APK de Mi Bodega

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Instalar dependencias
      run: |
        sudo apt-get update
        sudo apt-get install -y libncurses5 libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
        pip3 install --user --upgrade buildozer cython==0.29.33

    - name: Pre-instalar herramientas de Android
      run: |
        # Primero instalamos el SDK básico para tener acceso al sdkmanager
        # (Esto es un paso técnico para asegurar que tenemos las herramientas necesarias)
        buildozer android debug || true
        
        # Ahora instalamos explícitamente los build-tools 33.0.0 que son estables
        # y aceptamos licencias de todo lo que falte
        SDKMANAGER=$HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager
        yes | $SDKMANAGER "build-tools;33.0.0"
        yes | $SDKMANAGER --licenses

    - name: Compilar APK
      run: |
        export PATH=$PATH:~/.local/bin
        # Ahora Buildozer debería encontrar los tools 33 instalados y no intentar bajar los 37
        buildozer android debug

    - name: Guardar el archivo APK resultante
      uses: actions/upload-artifact@v4
      with:
        name: Mi-Bodega-APK
        path: bin/*.apk